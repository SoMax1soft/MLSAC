# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║                         MLSAC Hologram Configuration                          ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ┌───────────────────────────────────────────────────────────────────────────────┐
# │                               HOLOGRAM GUIDE                                  │
# ├───────────────────────────────────────────────────────────────────────────────┤
# │ Holograms display AI probability above player heads for staff.                │
# │ Uses optimized packet-based ArmorStands (entities only exist for staff).    │
# │                                                                               │
# │ UPDATE INTERVAL: How often (in ticks) to update hologram positions/text.     │
# │ VIEW DISTANCE: Max distance (in blocks) for staff to see holograms.         │
# └───────────────────────────────────────────────────────────────────────────────┘

nametags:
  # General toggle for suspect monitoring holograms
  enabled: true

  # How often to update holograms (in ticks). 20 = 1 second
  update-interval-ticks: 20

  # Max distance to see suspect holograms
  view-distance: 40

  # Default format for the hologram text
  # Placeholders: {AVG} - average probability, {HIST} - colored last probability
  format: '&6AVG &f{AVG}% &7| {HIST}'

  # Thresholds for probability coloring
  # medium (yellow), high (red), critical (dark red), critical_bold (bold dark red)
  colors:
    thresholds:
      medium: 0.5
      high: 0.6
      critical: 0.8
      critical-bold: 0.9