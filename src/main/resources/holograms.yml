# ║                         MLSAC Hologram Configuration                          ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# Configuration for Suspect Nametags
nametags:
  enabled: true
  hologram: '&6AVG &f{AVG}% &7| {HIST}'
  fast-format: '&2F&f{RESULT}%'
  pro-format: '&6P&f{RESULT}%'
  ultra-format: '&cU&f{RESULT}%'
  history-limit: 8
  update-interval-ticks: 1
  view-distance: 64
  colors:
    low: '&f'
    medium: '&f'
    high: '&c'
    critical: '&c'
    critical_bold: '&4'
    thresholds:
      medium: 0.5
      high: 0.6
      critical: 0.8
      critical-bold: 0.9